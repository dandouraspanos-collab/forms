<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Example</title>
</head>
<body>

  <form action="submit">
    <input type="submit">
  </form>

  <br><hr>

  <form action="submit">
    <select name="favoritecharacter[]" multiple>
      <optgroup label="Major Char">
        <option>Jerry</option>
        <option>George</option>
        <option selected>Kramer</option>
        <option>Elaine</option>
      </optgroup>

      <optgroup label="Minor Char">
        <option>Newman</option>
      </optgroup>
    </select>

    <br><br>

    <label for="visa">
      <input type="radio" name="cc" value="visa" id="visa" checked> Visa
    </label>

    <label for="mc">
      <input type="radio" name="cc" value="mc" id="mc"> Master Card
    </label>

    <label for="amex">
      <input type="radio" name="cc" value="amex" id="amex"> Amex
    </label>

    <br><br>

    <input type="hidden" name="school" value="NYIT">

    <input type="reset">
    <input type="submit">
  </form>

</body>
</html>
